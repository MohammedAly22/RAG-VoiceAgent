<svg xmlns="http://www.w3.org/2000/svg" width="920" height="660" viewBox="0 0 920 660" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22c55e"/><stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .card{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5;rx:14}
      .svc{fill:#f0fdf4;stroke:#86efac;stroke-width:1.5}
      .title{font-size:15px;font-weight:700;fill:#0f172a}
      .sub{font-size:11.5px;fill:#475569}
      .tag{font-size:11px;fill:#16a34a;font-weight:600}
      .flow{stroke:#94a3b8;stroke-width:1.6;fill:none}
      .port{font-size:10.5px;fill:#64748b;font-weight:600}
      .h{font-size:12px;fill:#64748b;font-style:italic}
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="660" fill="#ffffff"/>
  <rect x="0" y="0" width="920" height="660" fill="#f8fafc"/>

  <!-- Browser -->
  <rect x="210" y="24" width="500" height="78" rx="14" class="card"/>
  <rect x="210" y="24" width="6" height="78" rx="3" fill="url(#acc)"/>
  <text x="234" y="52" class="title">🖥️  Browser — React / Vite UI  (Arabic RTL · Cairo)</text>
  <text x="234" y="74" class="sub">Chat (streaming) · Voice Call (barge-in) · Dashboard · Data (multimodal) · Settings</text>
  <text x="234" y="92" class="tag">light / dark · animated · session &amp; call history</text>

  <text x="460" y="128" class="h" text-anchor="middle">REST + WebSocket  (token / audio streaming)</text>
  <line x1="460" y1="102" x2="460" y2="150" class="flow" marker-end="url(#arrow)"/>

  <!-- App -->
  <rect x="150" y="152" width="620" height="92" rx="14" class="card"/>
  <rect x="150" y="152" width="6" height="92" rx="3" fill="url(#acc)"/>
  <text x="176" y="182" class="title">⚙️  FastAPI App  ·  :8080  (env: voiceagent)</text>
  <text x="176" y="204" class="sub">Orchestrator · LangGraph RAG agent (route → retrieve → generate) · streaming proxies</text>
  <text x="176" y="224" class="sub">config / data / logs / sessions / calls APIs · SQLite persistence · serves the built UI</text>

  <!-- fan-out lines -->
  <line x1="250" y1="244" x2="120" y2="300" class="flow" marker-end="url(#arrow)"/>
  <line x1="390" y1="244" x2="360" y2="300" class="flow" marker-end="url(#arrow)"/>
  <line x1="530" y1="244" x2="560" y2="300" class="flow" marker-end="url(#arrow)"/>
  <line x1="660" y1="244" x2="770" y2="300" class="flow" marker-end="url(#arrow)"/>

  <!-- ASR -->
  <rect x="24" y="302" width="216" height="96" rx="12" class="svc"/>
  <text x="40" y="328" class="title">🎙️  ASR</text>
  <text x="40" y="349" class="sub">QwenCleo :8021 (GPU, streaming)</text>
  <text x="40" y="367" class="sub">— or — Gemini (app-native,</text>
  <text x="40" y="384" class="sub">one-shot, no VRAM)</text>

  <!-- LLM -->
  <rect x="266" y="302" width="200" height="96" rx="12" class="svc"/>
  <text x="282" y="328" class="title">🧠  LLM</text>
  <text x="282" y="349" class="sub">Gemini 2.5 Flash (default)</text>
  <text x="282" y="367" class="sub">— or — local vLLM :8011</text>
  <text x="282" y="384" class="sub">Qwen2.5-3B (bf16 / 4-bit)</text>

  <!-- TTS -->
  <rect x="492" y="302" width="188" height="96" rx="12" class="svc"/>
  <text x="508" y="328" class="title">🔊  TTS</text>
  <text x="508" y="349" class="sub">VoiceTut / Lahgtna :8022</text>
  <text x="508" y="367" class="sub">OmniVoice · 17 voices</text>
  <text x="508" y="384" class="sub">sentence-streamed</text>

  <!-- EoU -->
  <rect x="706" y="302" width="190" height="96" rx="12" class="svc"/>
  <text x="722" y="328" class="title">⏱️  EoU</text>
  <text x="722" y="349" class="sub">turn-detection :8023</text>
  <text x="722" y="367" class="sub">end-of-utterance</text>
  <text x="722" y="384" class="sub">+ VAD endpointing</text>

  <!-- Retrieval -->
  <line x1="360" y1="398" x2="360" y2="452" class="flow" marker-end="url(#arrow)"/>
  <rect x="150" y="454" width="620" height="86" rx="14" class="card"/>
  <rect x="150" y="454" width="6" height="86" rx="3" fill="url(#acc)"/>
  <text x="176" y="484" class="title">📚  Multimodal RAG  —  FAISS vector store  +  BM25 (hybrid)</text>
  <text x="176" y="506" class="sub">multilingual-e5 embeddings · text + tables + image/page captions (Gemini vision at ingest)</text>
  <text x="176" y="526" class="sub">score-thresholded retrieval → grounded answer with citations, or an explicit refusal</text>

  <!-- LiveKit -->
  <line x1="600" y1="244" x2="720" y2="574" class="flow" marker-end="url(#arrow)" stroke-dasharray="5 4"/>
  <rect x="470" y="566" width="426" height="70" rx="12" class="svc"/>
  <text x="486" y="592" class="title">📞  LiveKit realtime  (Section 1)</text>
  <text x="486" y="613" class="sub">local server + livekit-agents worker · STT→LLM→TTS · barge-in · @function_tool</text>
  <text x="486" y="630" class="sub">(retrieve_kb + get_order_status) · EoU turn-taking</text>

  <text x="120" y="588" class="port">plug-and-play via config.yaml:</text>
  <text x="120" y="606" class="sub">llm.backend · asr.provider · tts.engine</text>
  <text x="120" y="624" class="sub">— switch models, no code change</text>
</svg>
